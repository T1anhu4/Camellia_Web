name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DOCKER_REPO: ${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Lint & Test
  # ============================================================
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [gateway, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: matrix.component == 'gateway'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Setup Node
        if: matrix.component == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Go Lint
        if: matrix.component == 'gateway'
        working-directory: gateway
        run: |
          go vet ./...
          go mod verify

      - name: Go Test
        if: matrix.component == 'gateway'
        working-directory: gateway
        run: go test ./... -race -count=1 -timeout 120s

      - name: Frontend Lint
        if: matrix.component == 'frontend'
        working-directory: frontend
        run: |
          npm ci
          npx next lint

      - name: Frontend Build (type check)
        if: matrix.component == 'frontend'
        working-directory: frontend
        run: npm run build

  # ============================================================
  # Docker Build & Push
  # ============================================================
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        image:
          - name: gateway
            context: gateway
            dockerfile: gateway/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKER_REPO }}/llmgw-${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ============================================================
  # Deploy (Production)
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /opt/llmgateway
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --force-recreate
            docker compose -f docker-compose.production.yml ps

            # Wait for health checks
            sleep 15

            # Verify
            curl -sf http://localhost:8080/health || exit 1
            curl -sf http://localhost:3000/ || exit 1

            echo "Deploy successful!"
          EOF
